<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jornadas T38 — Spanish Racing Series</title>
    <link rel="stylesheet" href="css/srs.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>

  <body>
    <div class="ambient" aria-hidden="true"></div>

    <!-- ══ HEADER ══════════════════════════════════════════════ -->
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <span class="brand-icon">🏁</span>
          <span class="brand-name">SRS <span>T38</span></span>
        </a>
        <nav class="site-nav" aria-label="Principal">
          <a href="index.html">Inicio</a>
          <a href="jornadas.html" class="active">Jornadas</a>
          <a href="eliminatorias.html">Eliminatorias</a>
        </nav>
        <span class="season-badge">TEMP. 38</span>
      </div>
    </header>

    <!-- ══ PAGE HERO ═══════════════════════════════════════════ -->
    <div class="page-hero">
      <div class="container page-hero-inner">
        <div>
          <p class="section-label">// Fase de liga · Temporada 38</p>
          <h1 class="section-title">Jornadas <em>T38</em></h1>
          <p class="section-sub">
            10 jornadas · Lunes, miércoles y viernes a las 21:00 h (hora
            peninsular). Las jornadas se revelan conforme avanza la temporada.
          </p>
        </div>
        <div
          style="display: flex; gap: 10px; flex-wrap: wrap; align-items: center"
          id="jornadas-chips"
        ></div>
      </div>
    </div>

    <!-- ══ NEXT ROUND COUNTDOWN ════════════════════════════════ -->
    <div class="container" style="position: relative; z-index: 1">
      <div class="next-banner" id="next-banner">
        <div>
          <div class="next-banner-label">⏱ Próxima jornada</div>
          <div class="next-banner-text" id="next-name">—</div>
        </div>
        <span id="next-time" class="next-banner-time">--:--:--</span>
      </div>
    </div>

    <!-- ══ JORNADAS GRID ════════════════════════════════════════ -->
    <section class="page-section" style="padding-top: 0">
      <div class="container">
        <div class="jornada-grid" id="jornadas-grid"></div>
      </div>
    </section>

    <!-- ══ FOOTER ═══════════════════════════════════════════════ -->
    <footer class="site-footer">
      <div class="container footer-inner">
        <span class="footer-brand"
          >Spanish <span>Racing</span> Series · T38</span
        >
        <div class="footer-links" id="footer-links"></div>
      </div>
    </footer>

    <script src="js/srs-data.js"></script>
    <script>
      // ── FOOTER ────────────────────────────────────────────────
      document.getElementById("footer-links").innerHTML = SRS.redes
        .map(
          (r) =>
            `<a href="${r.href}" target="_blank" rel="noopener noreferrer">${r.label}</a>`,
        )
        .join("");

      // ── VISIBILITY LOGIC (CORREGIDO) ──────────────────────────
      // Una jornada es visible si es la primera, si está completada, o si la anterior ya se completó.
      function isVisible(idx) {
        if (idx === 0) return true; // La J1 siempre es visible

        const prev = SRS.jornadas[idx - 1];

        // Si la jornada anterior está marcada como completada, la actual debe ser visible
        if (
          prev &&
          (prev.completada === true || prev.estado === "completada")
        ) {
          return true;
        }

        // Por si acaso, si la propia jornada actual ya está activa o completada, la hacemos visible
        const actual = SRS.jornadas[idx];
        if (
          actual &&
          (actual.completada === true ||
            actual.estado === "completada" ||
            actual.estado === "activa")
        ) {
          return true;
        }

        return false;
      }

      // ── CHIPS ─────────────────────────────────────────────────
      (function () {
        const el = document.getElementById("jornadas-chips");
        SRS.jornadas.forEach((j, i) => {
          const visible = isVisible(i);
          const cls =
            j.estado === "completada"
              ? "chip--done"
              : j.estado === "activa"
                ? "chip--cyan"
                : "chip--grey";
          const span = document.createElement("span");
          span.className = `chip ${cls}`;
          span.textContent = visible ? `J${i + 1}` : `J${i + 1} 🔒`;
          el.appendChild(span);
        });
      })();

      // ── RENDER JORNADAS ───────────────────────────────────────
      // ── RENDER JORNADAS (CORREGIDO) ───────────────────────────
      (function () {
        const grid = document.getElementById("jornadas-grid");

        SRS.jornadas.forEach((j, idx) => {
          const visible = isVisible(idx);
          const card = document.createElement("div");
          card.className = "jornada-card" + (visible ? "" : " hidden-jornada");

          const statusChip =
            j.estado === "completada" || j.completada === true
              ? `<span class="chip chip--done">Completada</span>`
              : j.estado === "activa"
                ? `<span class="chip chip--cyan">En curso</span>`
                : `<span class="chip chip--grey">Pendiente</span>`;

          // Intentamos unificar si viene de "duelos" o de "enfrentamientos"
          const listaDuelos = j.duelos || j.enfrentamientos || [];

          let bodyHtml = "";
          if (!visible) {
            bodyHtml = `<div class="jornada-locked">
<div class="jornada-locked-icon">🔒</div>
<p>Se revelará tras la jornada anterior</p>
</div>`;
          } else if (listaDuelos.length > 0) {
            bodyHtml = listaDuelos
              .map((d) => {
                // Mapeo adaptativo: detecta si usa el formato antiguo (J1-J5) o el nuevo (J6+)
                const pilotoIzq = d.g || d.equipoA;
                const pilotoDer = d.l || d.equipoB;
                const posIzq = d.pg !== undefined ? d.pg : d.posA;
                const posDer = d.pl !== undefined ? d.pl : d.posB;

                const isSpecialG =
                  posIzq &&
                  (posIzq === "DNF" ||
                    posIzq === "DNS" ||
                    posIzq === "DSQ" ||
                    posIzq === "+2L");
                const isSpecialL =
                  posDer &&
                  (posDer === "DNF" ||
                    posDer === "DNS" ||
                    posDer === "DSQ" ||
                    posDer === "+2L");

                const posBadgeG =
                  posIzq !== undefined
                    ? `<span class="pos-badge w">${posIzq}</span>`
                    : "";
                const posBadgeL =
                  posDer !== undefined
                    ? `<span class="pos-badge ${isSpecialL ? "s" : "l"}">${posDer}</span>`
                    : "";

                return `<div class="duelo-row">
  <span class="duelo-driver winner duelo-driver-left">${pilotoIzq}</span>
  <div class="duelo-sep">
    <div class="duelo-sep-scores">
      ${posBadgeG}
      <span class="duelo-vs">vs</span>
      ${posBadgeL}
    </div>
  </div>
  <span class="duelo-driver loser duelo-driver-right">${pilotoDer}</span>
</div>`;
              })
              .join("");
          } else {
            bodyHtml = `<div class="jornada-locked">
<div class="jornada-locked-icon">📋</div>
<p>Resultados pendientes</p>
</div>`;
          }

          card.innerHTML = `
<div class="jornada-head">
<div>
  <div class="jornada-name">${j.nombre || "Jornada " + j.numero}</div>
  <div class="jornada-date">${j.fechaLabel || j.circuito}</div>
</div>
${statusChip}
</div>
<div class="jornada-body">${bodyHtml}</div>`;

          grid.appendChild(card);
        });
      })();
    </script>
  </body>
</html>
